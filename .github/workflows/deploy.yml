name: Deploy Lens

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend (Client)
        run: npm run build --workspace=@lens/client

      - name: Sync Assets to Engine
        run: |
          rm -rf apps/engine/public/*
          cp -r apps/client/dist/* apps/engine/public/

      - name: Deploy Engine (Full Stack Worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'apps/engine'
          command: deploy
