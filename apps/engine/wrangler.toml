name = "lens"
main = "src/index.ts"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (web frontend)
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 Database (Metadata)
[[d1_databases]]
binding = "DB"
database_name = "lens-d1"
database_id = "af9a1e43-7c7b-47da-add7-ed16d6de5ee5"

# Vectorize Index (Semantic Search)
[[vectorize]]
binding = "VECTORIZE"
index_name = "lens-vectorize"

# Workers AI
[ai]
binding = "AI"
gateway = "lens-gateway"

# R2 Bucket (Image Storage)
[[r2_buckets]]
binding = "R2"
bucket_name = "lens-r2"

[[kv_namespaces]]
binding = "SETTINGS"
id = "22886c458d704579b15981987dca7dc5"

# Analytics Engine (Telemetry)
[[analytics_engine_datasets]]
binding = "TELEMETRY"
dataset = "lens-ae"

# Rate Limiting (Search API)
[[unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

# Workflow (Ingestion Orchestration)
[[workflows]]
binding = "PHOTO_WORKFLOW"
name = "lens-workflow"
class_name = "LensIngestWorkflow"

# Queue Producer
[[queues.producers]]
binding = "PHOTO_QUEUE"
queue = "lens-queue"

# Queue Consumer
[[queues.consumers]]
queue = "lens-queue"
max_batch_size = 5
max_batch_timeout = 30
max_concurrency = 5

# Cron Trigger
[triggers]
crons = ["0 * * * *"]
